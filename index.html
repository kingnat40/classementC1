<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement Circuit 1</title>

<style>
    body {
        font-family: 'Orbitron', Arial, sans-serif;
        background: #0a0a0a;
        color: #fff;
        padding: 20px;
        text-align: center;
    }

    h2 {
        color: #ff1e00;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
        text-shadow: 0 0 10px #ff1e00;
    }

    table {
        width: 100%;
        max-width: 900px;
        margin: auto;
        border-collapse: collapse;
        background: #111;
        border: 2px solid #ff1e00;
        box-shadow: 0 0 15px #ff1e00;
    }

    th {
        background: #1a1a1a;
        padding: 12px;
        border: 1px solid #ff1e00;
        color: #ff1e00;
        font-size: 18px;
        text-transform: uppercase;
    }

    td {
        padding: 10px;
        border: 1px solid #333;
        background: #0d0d0d;
        font-size: 15px;
        color: #e6e6e6;
    }

    tr:hover td {
        background: #1a1a1a;
    }
</style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<h2>Classement – Circuit 1</h2>

<table>
    <thead>
        <tr>
            <th>B</th>
            <th>C</th>
            <th>D</th>
            <th>E</th>
            <th>F</th>
        </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/1pQFrWHNb33OqKWFB2I26iUuvN81JyST6ux3MRDrY4aw/gviz/tq?tqx=out:json&sheet=CIRCUIT1";

async function loadData() {
    const response = await fetch(sheetURL);
    const text = await response.text();
    const json = JSON.parse(text.substring(47, text.length - 2));

    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    // Lignes 8 à 18 → index 7 à 17
    for (let i = 7; i <= 17; i++) {
        const row = json.table.rows[i]?.c;
        if (!row) continue;

        const tr = document.createElement("tr");

        for (let col = 1; col <= 5; col++) {
            const td = document.createElement("td");
            td.textContent = row[col]?.v || "";
            tr.appendChild(td);
        }

        tbody.appendChild(tr);
    }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
